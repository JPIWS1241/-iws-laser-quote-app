<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IWS Laser Quote App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>IWS Laser Quote App</h1></header>
  <main>
    <section class="inputs">
      <label>Material
        <select id="material"></select>
      </label>

      <label>Part width (in)
        <input id="areaW" type="number" step="0.01" value="10">
      </label>

      <label>Part height (in)
        <input id="areaH" type="number" step="0.01" value="5">
      </label>

      <label>Number of parts
        <input id="parts" type="number" min="1" value="1">
      </label>

      <label>Total cut length per part (inches)
        <input id="cutLength" type="number" step="0.01" value="12">
      </label>

      <label>Machine hourly (flat)
        <input id="machineRate" type="number" step="0.01" value="0">
      </label>

      <label>Labor flat
        <input id="laborRate" type="number" step="0.01" value="0">
      </label>

      <label>Margin (%)
        <input id="margin" type="number" step="0.1" value="25">
      </label>

      <button id="calculate">Calculate Quote</button>
    </section>

    <section class="result" id="result">
      <!-- results appear here -->
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
